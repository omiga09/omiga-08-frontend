<div class="dashboard-layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-name">{{ (companyName || 'OMIGA08') | uppercase }}</span>
      <span class="brand-suffix">GATEWAY</span>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-section">
        <span class="nav-section-title">Overview</span>
        <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
          <span class="nav-icon">⊞</span> Dashboard
        </a>
      </div>

      <div class="nav-section">
        <span class="nav-section-title">Manage</span>
        <a routerLink="/dashboard/services" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">⚙</span> Services
        </a>
        <a routerLink="/dashboard/api-keys" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">⚿</span> API Keys
        </a>
        <a routerLink="/dashboard/rate-limits" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">◷</span> Rate Limits
        </a>
        <a routerLink="/dashboard/transformations" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">⇄</span> Transformations
        </a>
      </div>

      <div class="nav-section">
        <span class="nav-section-title">Monitor</span>
        <a routerLink="/dashboard/analytics" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">▤</span> Analytics
        </a>
        <a routerLink="/dashboard/documentation" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">▦</span> Documentation
        </a>
      </div>

    </nav>
  </aside>

  <div class="main-area">

    <header class="topbar">
      <div class="topbar-left"></div>
      <div class="topbar-right">
        <div class="user-menu">
          <div class="user-info">
            <span class="user-email">{{ userEmail }}</span>
            <span class="user-role">{{ userRole }}</span>
          </div>
          <button class="btn-logout" (click)="logout()">Logout</button>
        </div>
      </div>
    </header>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
