<div class="login-container">
  <div class="login-card">

    <div class="brand-logo">
      <span class="brand-name">OMIGA08</span>&nbsp;<span class="brand-suffix">GATEWAY</span>
    </div>

    <ng-container *ngIf="!isSubmitted()">
      <h1>Reset your password</h1>
      <p class="subtitle">Enter your email and we'll send you a reset link</p>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email address</label>
          <input id="email" type="email" formControlName="email" placeholder="you@company.com" />
          <span class="error" *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched">
            Please enter a valid email
          </span>
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading()">
          {{ isLoading() ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </form>
    </ng-container>

    <ng-container *ngIf="isSubmitted()">
      <h1>Check your email</h1>
      <p class="subtitle">If an account exists with that email, we've sent a password reset link. It will expire in 15 minutes.</p>
    </ng-container>

    <p class="footer-link">
      <a routerLink="/login">← Back to sign in</a>
    </p>

  </div>
</div>
