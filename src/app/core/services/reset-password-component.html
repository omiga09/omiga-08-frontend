<div class="login-container">
  <div class="login-card">

    <div class="brand-logo">
      <span class="brand-name">OMIGA08</span>&nbsp;<span class="brand-suffix">GATEWAY</span>
    </div>

    <ng-container *ngIf="!isSuccess()">
      <h1>Set new password</h1>
      <p class="subtitle">Choose a strong password for your account</p>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">

        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input id="newPassword" type="password" formControlName="newPassword" placeholder="At least 8 characters" />
          <span class="error" *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
            Password must be at least 8 characters
          </span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="Re-enter your password" />
        </div>

        <div class="error-banner" *ngIf="errorMessage()">
          {{ errorMessage() }}
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading() || !token">
          {{ isLoading() ? 'Resetting...' : 'Reset Password' }}
        </button>
      </form>
    </ng-container>

    <ng-container *ngIf="isSuccess()">
      <h1>Password reset successful</h1>
      <p class="subtitle">Redirecting you to sign in...</p>
    </ng-container>

    <p class="footer-link">
      <a routerLink="/login">← Back to sign in</a>
    </p>

  </div>
</div>
